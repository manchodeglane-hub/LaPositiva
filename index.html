<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmación de Boda</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@400;700&family=Raleway:wght@300&display=swap');
        body { background-color: #fcf9f2; font-family: 'Raleway', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); max-width: 400px; width: 90%; text-align: center; border: 1px solid #eee; }
        h1 { font-family: 'Playfair Display', serif; color: #bc9c70; margin-bottom: 5px; }
        .info { color: #888; font-size: 0.8em; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e0e0e0; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; padding: 15px; background: #bc9c70; color: white; border: none; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #a6865a; }
        #mensaje { display: none; color: #bc9c70; font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>María & Juan</h1>
        <div class="info">15.10.2024 • Hacienda La Querencia</div>
        
        <form id="weddingForm">
            <input type="text" name="nombres" placeholder="Nombres" required>
            <input type="text" name="apellidos" placeholder="Apellidos" required>
            <input type="email" name="correo" placeholder="Correo electrónico" required>
            <select name="asistencia" required>
                <option value="" disabled selected>¿Asistirás?</option>
                <option value="Sí">Sí, ¡con gusto!</option>
                <option value="No">No podré asistir</option>
            </select>
            <textarea name="mensaje" placeholder="Mensaje para los novios (opcional)"></textarea>
            <button type="submit" id="btnEnviar">Confirmar Asistencia</button>
        </form>
        <div id="mensaje">¡Gracias! Hemos recibido tu respuesta.</div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwELgKS9VbimCNPrhExm_kI-a3zEU3oNmkRZFQMm_YdSuDTT9G1zGZXzekGOI8096d4/exec'; // <--- PEGA AQUÍ LA URL NUEVA
        const form = document.getElementById('weddingForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    form.style.display = 'none';
                    document.getElementById('mensaje').style.display = 'block';
                })
                .catch(error => {
                    alert('Error al enviar. Inténtalo de nuevo.');
                    btn.innerText = "CONFIRMAR ASISTENCIA";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
